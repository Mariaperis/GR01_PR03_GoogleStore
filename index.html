<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Pixel Buds Pro</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header class="header">
        <nav class="nav">
            <img src="images/google-logo.png" alt="Google Store Logo">
            <a href="#">Phones</a>
            <a href="#">Earbuds</a>
            <a href="#">Watches</a>
            <a href="#">Smart Home</a>
            <a href="#">Accesories</a>
            <a href="#">Subscriptions</a>
        </nav>
        <div class="header-icons">
            <img src="images/icons/Search.svg" alt="Search Icon">
            <img src="images/icons/Help.svg" alt="Help Icon">
            <img src="images/icons/Cart.svg" alt="Cart Icon">
            <img src="images/icons/Avatar.svg" alt="Avatar Icon">
        </div>
        <div class="menu-btn" id="menuBtn">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </header>
    <main class="product-container">
    <section class="product-gallery">
        <div class="product-circle">
            <img src="images/earbuds/earbuds_01.png" alt="Pixel Buds vista frontal">
            <img src="images/earbuds/earbuds_02.png" alt="Pixel Buds vista lateral">
            <img src="images/earbuds/earbuds_03.png" alt="Pixel Buds detalle">
            <img src="images/earbuds/earbuds_04.png" alt="Pixel Buds en uso">
        </div>
        <div class="product-big">
            <img src="images/earbuds/earbuds_01.png" alt="Google Pixel Buds Pro">
        </div>
    </section>
    <aside class="product-info">
        <h1>Google Pixel Buds Pro</h1>
        <p class="category">Music & Sound</p>
        <p class="price">229€</p>
        <hr>
        <div class="colors">
            <p>Choose a color</p>
            <div class="color-selector">
                <button class="color-dot blue" aria-label="Blue"></button>
                <button class="color-dot charcoal" aria-label="Charcoal"></button>
                <button class="color-dot porcelain" aria-label="Porcelain"></button>
                <button class="color-dot lemongrass" aria-label="Lemongrass"></button>
                <button class="color-dot green" aria-label="Green"></button>
                <button class="color-dot red" aria-label="Red"></button>
            </div>
        </div>
        <div class="buy-box">
            <p class="buy-price">229€</p>
            <div class="buy-action">
                <select>
                    <option value="1">1</option>
                    <option value="2">2</option>
                    <option value="3">3</option>
                </select>
                <button class="add-cart">
                    Add to Cart
                </button>
            </div>
            <p class="delivery">
                <span class="truck-icon"><img src="images/icons/Delivery.svg" alt="Truck Icon"></span>
                Delivers 29 Apr to <b>08023</b>
            </p>
        </div>
    </aside>
</main>
    <script>
        const menuBtn = document.getElementById('menuBtn');
        const menu = document.getElementById('menu');
        menuBtn.addEventListener('click', () => {
            menu.classList.toggle('show');
        });
    </script>
</body>

</html>
